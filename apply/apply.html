<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="apply.css">
  <title>Biometric Enrollment</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    <nav class="navbar">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="apply.html">Apply</a></li>
        <li><a href="/contact/contact.html">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section id="apply-section">
      <div class="terminal-window">
        <!-- LEFT -->
        <div class="terminal-left">
          <h2 class="terminal-title">BIOMETRIC ENROLLMENT</h2>
          <form id="form" onsubmit="event.preventDefault();">
            <div class="input-row">
              <div class="input-group">
                <label>FIRST NAME</label>
                <input type="text" id="first">
              </div>
              <div class="input-group">
                <label>LAST NAME</label>
                <input type="text" id="last">
              </div>
            </div>
            <div class="input-group">
              <label>EMAIL</label>
              <input type="email" id="email">
            </div>
            <div class="file-preview-zone" id="file-name">NO FILE</div>
            <div class="action-buttons">
              <button type="button" class="tech-btn" id="upload">UPLOAD</button>
              <input type="file" id="file" hidden>
              <button type="button" class="tech-btn" id="generate">GENERATE</button>
            </div>
            <div class="video-container">
              <video id="video" autoplay playsinline></video>
              <div class="laser" id="laser"></div>
            </div>
            <button type="button" class="tech-btn" id="scan">START SCAN</button>
            <p id="status-text">STATUS: STANDBY</p>
          </form>
        </div>
        <!-- RIGHT -->
        <div class="terminal-right">
          <div class="id-card-modern">
            <div class="photo-area">
              <img id="preview-img" src="https://via.placeholder.com/150">
            </div>
            <h3 id="preview-name">SUBJECT_NULL</h3>
            <p id="preview-email">---</p>
            <p id="preview-file">NONE</p>
            <div class="verify-badge" id="badge">LOCKED</div>
            <button id="submit" class="neon-glass-btn" disabled>SEND</button>
          </div>
        </div>
      </div>
    </section>
  </main>


  
  <script src="apply.js"></script>
  <script src="../main.js"></script>
</body>

</html>
