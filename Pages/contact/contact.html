<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="/Features/dark-mode/dark-mode.css">
  <link rel="stylesheet" href="/Features/the-dome-menu/dome-menu.css">
  <link rel="stylesheet" href="/Features/navbar/navbar.css">
  <link rel="stylesheet" href="/Features/footer/footer.css">
  <link rel="stylesheet" href="/Features/bg-animation/bg-animation.css">
    <link rel="stylesheet" href="/Pages/contact/contact.css">
  <title>Contact Terminal | Enfield Dev Ltd</title>
  </head>
<body>

<div id="background-animation-mount">
    <svg id="plexusSVG"></svg>
</div>
<div id="navbar-mount"></div>
<div id="dome-menu-mount"></div>
<div id="dark-mode-mount"></div>

  <div class="site-wrapper">
    <main>
      <div class="transmission-console glass-panel">
        <div class="console-header">
          <h3>Transmission Console</h3>
          <p>Fill out the parameters below to dispatch your message sequence securely.</p>
        </div>

        <form id="secureContactForm" onsubmit="handleMessageTransmission(event)" style="display: flex; flex-direction: column; gap: 20px;">
          <div class="console-field">
            <label for="identityKey">Operator Identity Name</label>
            <input type="text" id="identityKey" placeholder="Enter full name or identifier..." required>
          </div>

          <div class="console-field">
            <label for="commsEmail">Return Sub-Space Routing Email</label>
            <input type="email" id="commsEmail" placeholder="yourname@domain.com" required>
          </div>

          <div class="console-field">
            <label for="payloadMessage">Message Encrypted Data Payload</label>
            <textarea id="payloadMessage" rows="6" placeholder="State your objective, technical parameters, or project brief..." required></textarea>
          </div>

          <button type="submit" class="transmit-btn">Send</button>
        </form>
      </div>
    </main>
  </div>

  <div class="popup-overlay" id="transmissionSuccessPopup">
    <div class="popup-card">
      <h4>Transmission Successful</h4>
      <p>Your message data stream has been securely dispatched to the matrix node terminal.</p>
      <button class="popup-close-btn" onclick="dismissPopupAlert()">Dismiss</button>
    </div>
  </div>
  
   <div id="footer-mount"></div>



       <script src="/Features/bg-animation/bg-animation.js"></script>
    <script src="/Features/navbar/navbar.js"></script>
    <script src="/Features/the-dome-menu/dome-menu.js"></script>
    <script src="/Features/dark-mode/dark-mode.js"></script>
    <script src="/Features/footer/footer.js"></script>
</body>
</html>
